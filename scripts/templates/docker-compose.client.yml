# ─── Per-Client Docker Compose (Template) ──────────────────
# Generated by provision-client.sh
# Usage: docker compose up -d
# ────────────────────────────────────────────────────────────

services:
  storefront-${CLIENT_SLUG}:
    build:
      context: ../../
      dockerfile: apps/storefront/Dockerfile
    container_name: storefront-${CLIENT_SLUG}
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000" # Dokploy/reverse proxy assigns external port
    depends_on:
      medusa-${CLIENT_SLUG}:
        condition: service_healthy
    networks:
      - ${CLIENT_SLUG}-net

  medusa-${CLIENT_SLUG}:
    build:
      context: ../../
      dockerfile: apps/medusa/Dockerfile
    container_name: medusa-${CLIENT_SLUG}
    restart: unless-stopped
    env_file: .env
    ports:
      - "9000" # Internal only
    depends_on:
      redis-${CLIENT_SLUG}:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ${CLIENT_SLUG}-net

  redis-${CLIENT_SLUG}:
    image: redis:7-alpine
    container_name: redis-${CLIENT_SLUG}
    restart: unless-stopped
    volumes:
      - redis-${CLIENT_SLUG}-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - ${CLIENT_SLUG}-net

volumes:
  redis-${CLIENT_SLUG}-data:


networks:
  ${CLIENT_SLUG}-net:
    driver: bridge
