name: Build & Deploy Storefront

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract repo name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ steps.repo.outputs.name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/storefront
          file: ./apps/storefront/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_STORE_URL=${{ secrets.NEXT_PUBLIC_STORE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Dokploy
        if: ${{ vars.DOKPLOY_APP_ID != '' }}
        run: |
          curl -sf -X POST "${{ secrets.DOKPLOY_URL }}/api/trpc/application.redeploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_TOKEN }}" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"json": {"applicationId": "${{ vars.DOKPLOY_APP_ID }}"}}'
          echo "✅ Dokploy redeploy triggered"

      - name: Post-deploy health check
        if: ${{ vars.DOKPLOY_APP_ID != '' && vars.STORE_DOMAIN != '' }}
        run: |
          echo "⏳ Waiting for container startup..."
          for i in 1 2 3 4; do
            sleep 30
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              "https://${{ vars.STORE_DOMAIN }}/api/health" 2>/dev/null || echo "000")
            echo "  Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "✅ Storefront healthy"
              exit 0
            fi
          done
          echo "⚠️ Storefront not responding after 120s — check Dokploy logs"
          exit 1
