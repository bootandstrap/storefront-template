name: Docker Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/medusa/**'
      - 'apps/storefront/**'
      - 'packages/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'What to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - medusa
          - storefront

env:
  REGISTRY: ghcr.io
  MEDUSA_IMAGE: ghcr.io/bootandstrap/medusa
  STOREFRONT_IMAGE: ghcr.io/bootandstrap/storefront

permissions:
  contents: read
  packages: write

jobs:
  # ── Build Medusa ─────────────────────────────────
  build-medusa:
    name: Build Medusa
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'medusa'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MEDUSA_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Medusa
        uses: docker/build-push-action@v6
        with:
          context: ./apps/medusa
          file: ./apps/medusa/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=medusa
          cache-to: type=gha,mode=max,scope=medusa

  # ── Build Storefront ─────────────────────────────
  build-storefront:
    name: Build Storefront
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'storefront'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.STOREFRONT_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Storefront
        uses: docker/build-push-action@v6
        with:
          context: ./apps/storefront
          file: ./apps/storefront/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_STORE_URL=${{ secrets.NEXT_PUBLIC_STORE_URL }}
          cache-from: type=gha,scope=storefront
          cache-to: type=gha,mode=max,scope=storefront

  # ── Deploy to Dokploy ────────────────────────────
  deploy:
    name: Deploy to Dokploy
    runs-on: ubuntu-latest
    needs: [build-medusa, build-storefront]
    if: always() && !cancelled() && (needs.build-medusa.result == 'success' || needs.build-storefront.result == 'success')
    timeout-minutes: 5

    steps:
      - name: Deploy Medusa via Dokploy
        if: needs.build-medusa.result == 'success'
        run: |
          curl -s -X POST "${{ secrets.DOKPLOY_URL }}/api/application.redeploy" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ secrets.DOKPLOY_MEDUSA_APP_ID }}"}'

      - name: Deploy Storefront via Dokploy
        if: needs.build-storefront.result == 'success'
        run: |
          curl -s -X POST "${{ secrets.DOKPLOY_URL }}/api/application.redeploy" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ secrets.DOKPLOY_STOREFRONT_APP_ID }}"}'
