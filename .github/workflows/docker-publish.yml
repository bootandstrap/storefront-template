# ============================================
# Docker Build & Deploy — Storefront (Source Repo)
# ============================================
# Builds the generic storefront template image.
# For per-tenant builds, see deploy.yml.
# For Medusa builds, see build-medusa.yml.
#
# NOTE: This workflow runs on the SOURCE template repo
# AND is inherited by tenant repos. The storefront build
# here pushes to ghcr.io/bootandstrap/storefront (generic).
# Tenant-specific builds use deploy.yml instead, which
# pushes to ghcr.io/bootandstrap/store-{slug}.

name: Docker Build & Deploy (Storefront)

on:
  push:
    branches: [main]
    paths:
      - 'apps/storefront/**'
      - 'packages/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

# Prevent double-trigger with deploy.yml on the same push
concurrency:
  group: docker-build-${{ github.repository }}-${{ github.sha }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  STOREFRONT_IMAGE: ghcr.io/bootandstrap/storefront

permissions:
  contents: read
  packages: write

jobs:
  # ── Build Storefront ─────────────────────────────
  build-storefront:
    name: Build Storefront
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run on source repo — tenant repos use deploy.yml
    if: github.repository == 'bootandstrap/storefront-template'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.STOREFRONT_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Storefront
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/storefront/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_STORE_URL=${{ secrets.NEXT_PUBLIC_STORE_URL }}
          cache-from: type=gha,scope=storefront
          cache-to: type=gha,mode=max,scope=storefront

  # ── Deploy to Dokploy ────────────────────────────
  deploy:
    name: Deploy to Dokploy
    runs-on: ubuntu-latest
    needs: [build-storefront]
    if: needs.build-storefront.result == 'success'
    timeout-minutes: 10

    steps:
      - name: Deploy Storefront via Dokploy
        run: |
          curl -sf -X POST "${{ secrets.DOKPLOY_URL }}/api/trpc/application.redeploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"json": {"applicationId": "${{ secrets.DOKPLOY_STOREFRONT_APP_ID }}"}}'
          echo "✅ Storefront redeploy triggered"

      - name: Health check — Storefront
        if: ${{ vars.STORE_DOMAIN != '' }}
        run: |
          echo "⏳ Waiting for Storefront startup..."
          for i in 1 2 3 4; do
            sleep 30
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              "https://${{ vars.STORE_DOMAIN }}/api/health" 2>/dev/null || echo "000")
            echo "  Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "✅ Storefront healthy"
              exit 0
            fi
          done
          echo "⚠️ Storefront not responding after 120s — check Dokploy logs"
          exit 1

  # ── Failure Notification ────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-storefront, deploy]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          if [ -n "${{ secrets.BSWEB_INTERNAL_API_TOKEN }}" ] && [ -n "${{ secrets.BSWEB_URL }}" ]; then
            curl -s -X POST "${{ secrets.BSWEB_URL }}/api/admin/ci-notification" \
              -H "Authorization: Bearer ${{ secrets.BSWEB_INTERNAL_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{
                "repo": "${{ github.repository }}",
                "workflow": "${{ github.workflow }}",
                "status": "failure",
                "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "ref": "${{ github.ref }}",
                "actor": "${{ github.actor }}"
              }' && echo "✅ Notification sent" || echo "⚠️ Notification failed (non-blocking)"
          else
            echo "⚠️ BSWEB_URL or BSWEB_INTERNAL_API_TOKEN not configured — skipping notification"
          fi
