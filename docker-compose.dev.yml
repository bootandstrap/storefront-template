# ============================================
# Campifrut v2 — Docker Compose (Development)
# ============================================
# Hot-reload for storefront and Medusa.
# Usage: docker compose -f docker-compose.dev.yml up
#
# Storefront: http://localhost:3000
# Medusa API: http://localhost:9000
# Medusa Admin: http://localhost:9000/app
# ============================================

services:
  # ── Next.js Storefront (hot-reload) ────────
  storefront:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "
        corepack enable &&
        corepack prepare pnpm@latest --activate &&
        pnpm install --no-frozen-lockfile &&
        pnpm dev --hostname 0.0.0.0
      "
    ports:
      - "3000:3000"
    volumes:
      - ./apps/storefront:/app
      - storefront_node_modules:/app/node_modules
      - ./.env:/app/.env.local:ro
    env_file: .env
    environment:
      - NODE_ENV=development
      # Medusa runs on host network, reach it via host.docker.internal
      - MEDUSA_BACKEND_URL=http://host.docker.internal:9000
      - WATCHPACK_POLLING=true
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Medusa Backend (hot-reload) ────────────
  # Uses host networking to directly reach Supabase DB
  medusa:
    image: node:20-alpine
    working_dir: /app
    network_mode: host
    command: >
      sh -c "
        apk add --no-cache python3 make g++ curl &&
        npm install --legacy-peer-deps &&
        npx medusa develop --host 0.0.0.0
      "
    volumes:
      - ./apps/medusa:/app
      - medusa_node_modules:/app/node_modules
    env_file: .env
    environment:
      - NODE_ENV=development
      - MEDUSA_WORKER_MODE=shared
      # Host network: Redis is on localhost:6379 (port-mapped from container)
      - REDIS_URL=redis://localhost:6379
    restart: unless-stopped

  # ── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  storefront_node_modules:
    driver: local
  medusa_node_modules:
    driver: local
  redis_dev_data:
    driver: local
