# F-35: Lighthouse CI — Post-deploy performance gate
#
# Runs Lighthouse audit on the deployed storefront after successful deploy.
# Fails if performance or accessibility scores drop below 80.
#
# Triggered: manually or after deploy completes.

name: Lighthouse Deploy Audit

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to audit (e.g., https://slug.bootandstrap.com)'
        required: true
        type: string
  workflow_run:
    workflows: ['Build & Deploy Storefront']
    types: [completed]

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    if: ${{ github.repository != 'bootandstrap/storefront-template' && (github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && vars.STORE_DOMAIN != '')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine URL
        id: url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.url }}" >> $GITHUB_OUTPUT
          else
            # Use STORE_DOMAIN variable set by provisioning
            echo "target=https://${{ vars.STORE_DOMAIN }}" >> $GITHUB_OUTPUT
          fi

      - name: Wait for deploy to stabilize
        run: sleep 30

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        id: lighthouse
        with:
          configPath: ./apps/storefront/lighthouserc.deploy.json
          urls: |
            ${{ steps.url.outputs.target }}
            ${{ steps.url.outputs.target }}/es/productos
          runs: 3
          temporaryPublicStorage: true

      - name: Summarize Lighthouse assertions
        run: |
          echo "🔍 Lighthouse assertion results:"
          echo '${{ steps.lighthouse.outputs.assertionResults }}' | jq '.' || true

      - name: Upload Lighthouse Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14
