# ============================================
# Build Medusa — Source Repo Only
# ============================================
# Builds the SHARED Medusa Docker image used by ALL tenants.
# Only runs on the source template repo — tenant forks/copies
# are blocked by the repository guard below.
#
# Tenant storefronts are built by deploy.yml (per-tenant).

name: Build Medusa (Shared Image)

on:
  push:
    branches: [main]
    paths:
      - 'apps/medusa/**'
      - '.github/workflows/build-medusa.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  MEDUSA_IMAGE: ghcr.io/bootandstrap/medusa

permissions:
  contents: read
  packages: write

jobs:
  build-medusa:
    name: Build Medusa
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # ⚠️ CRITICAL GUARD: Only run on the source template repo.
    # Tenant repos inherit this workflow but MUST NOT overwrite
    # the shared medusa:latest image.
    if: github.repository == 'bootandstrap/storefront-template'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MEDUSA_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Medusa
        uses: docker/build-push-action@v6
        with:
          context: ./apps/medusa
          file: ./apps/medusa/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=medusa
          cache-to: type=gha,mode=max,scope=medusa

  # ── Deploy shared Medusa to all tenant instances ──
  # Non-blocking: uses continue-on-error so the build result stays green
  # even when deploy secrets are not yet configured.
  deploy-medusa:
    name: Deploy Medusa to Dokploy
    runs-on: ubuntu-latest
    needs: [build-medusa]
    if: needs.build-medusa.result == 'success'
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Deploy Medusa via Dokploy
        # vars.* is allowed in if: conditions (unlike secrets.*)
        if: vars.DOKPLOY_MEDUSA_APP_ID != ''
        env:
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_MEDUSA_APP_ID: ${{ vars.DOKPLOY_MEDUSA_APP_ID }}
        run: |
          if [ -z "$DOKPLOY_API_TOKEN" ] || [ -z "$DOKPLOY_URL" ]; then
            echo "⚠️ DOKPLOY secrets not configured — skipping deploy"
            exit 0
          fi
          curl -sf -X POST "${DOKPLOY_URL}/api/trpc/application.redeploy" \
            -H "x-api-key: ${DOKPLOY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"json\": {\"applicationId\": \"${DOKPLOY_MEDUSA_APP_ID}\"}}"
          echo "✅ Medusa redeploy triggered"

      - name: Health check — Medusa
        if: vars.MEDUSA_DOMAIN != ''
        env:
          MEDUSA_DOMAIN: ${{ vars.MEDUSA_DOMAIN }}
        run: |
          echo "⏳ Waiting for Medusa startup..."
          for i in 1 2 3 4; do
            sleep 30
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              "https://${MEDUSA_DOMAIN}/health" 2>/dev/null || echo "000")
            echo "  Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "✅ Medusa healthy"
              exit 0
            fi
          done
          echo "⚠️ Medusa not responding after 120s — check Dokploy logs"
          exit 1

  # ── Failure Notification ────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-medusa]
    # Only notify on build failure, not deploy failure
    if: failure()
    steps:
      - name: Send failure notification
        env:
          BSWEB_TOKEN: ${{ secrets.BSWEB_INTERNAL_API_TOKEN }}
          BSWEB_URL: ${{ secrets.BSWEB_URL }}
        run: |
          if [ -n "$BSWEB_TOKEN" ] && [ -n "$BSWEB_URL" ]; then
            curl -s -X POST "${BSWEB_URL}/api/admin/ci-notification" \
              -H "Authorization: Bearer ${BSWEB_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{
                "repo": "${{ github.repository }}",
                "workflow": "${{ github.workflow }}",
                "status": "failure",
                "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "ref": "${{ github.ref }}",
                "actor": "${{ github.actor }}"
              }' && echo "✅ Notification sent" || echo "⚠️ Notification failed (non-blocking)"
          else
            echo "⚠️ BSWEB_URL or BSWEB_INTERNAL_API_TOKEN not configured — skipping notification"
          fi
