name: Docker Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/medusa/**'
      - 'apps/storefront/**'
      - 'packages/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'What to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - medusa
          - storefront

env:
  REGISTRY: ghcr.io
  MEDUSA_IMAGE: ghcr.io/bootandstrap/medusa
  STOREFRONT_IMAGE: ghcr.io/bootandstrap/storefront

permissions:
  contents: read
  packages: write

jobs:
  # ── Build Medusa ─────────────────────────────────
  build-medusa:
    name: Build Medusa
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'medusa'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MEDUSA_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Medusa
        uses: docker/build-push-action@v6
        with:
          context: ./apps/medusa
          file: ./apps/medusa/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=medusa
          cache-to: type=gha,mode=max,scope=medusa

  # ── Build Storefront ─────────────────────────────
  build-storefront:
    name: Build Storefront
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'storefront'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.STOREFRONT_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Storefront
        uses: docker/build-push-action@v6
        with:
          context: ./apps/storefront
          file: ./apps/storefront/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_STORE_URL=${{ secrets.NEXT_PUBLIC_STORE_URL }}
          cache-from: type=gha,scope=storefront
          cache-to: type=gha,mode=max,scope=storefront

  # ── Deploy to Dokploy ────────────────────────────
  deploy:
    name: Deploy to Dokploy
    runs-on: ubuntu-latest
    needs: [build-medusa, build-storefront]
    if: always() && !cancelled() && (needs.build-medusa.result == 'success' || needs.build-storefront.result == 'success')
    timeout-minutes: 10

    steps:
      - name: Deploy Medusa via Dokploy
        if: needs.build-medusa.result == 'success'
        run: |
          curl -s -X POST "${{ secrets.DOKPLOY_URL }}/api/application.redeploy" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ secrets.DOKPLOY_MEDUSA_APP_ID }}"}'
          echo "✅ Medusa redeploy triggered"

      - name: Deploy Storefront via Dokploy
        if: needs.build-storefront.result == 'success'
        run: |
          curl -s -X POST "${{ secrets.DOKPLOY_URL }}/api/application.redeploy" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ secrets.DOKPLOY_STOREFRONT_APP_ID }}"}'
          echo "✅ Storefront redeploy triggered"

      - name: Health check — Medusa
        if: ${{ needs.build-medusa.result == 'success' && vars.MEDUSA_DOMAIN != '' }}
        run: |
          echo "⏳ Waiting for Medusa startup..."
          for i in 1 2 3 4; do
            sleep 30
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              "https://${{ vars.MEDUSA_DOMAIN }}/health" 2>/dev/null || echo "000")
            echo "  Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "✅ Medusa healthy"
              exit 0
            fi
          done
          echo "⚠️ Medusa not responding after 120s — check Dokploy logs"
          exit 1

      - name: Health check — Storefront
        if: ${{ needs.build-storefront.result == 'success' && vars.STORE_DOMAIN != '' }}
        run: |
          echo "⏳ Waiting for Storefront startup..."
          for i in 1 2 3 4; do
            sleep 30
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              "https://${{ vars.STORE_DOMAIN }}/api/health" 2>/dev/null || echo "000")
            echo "  Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "✅ Storefront healthy"
              exit 0
            fi
          done
          echo "⚠️ Storefront not responding after 120s — check Dokploy logs"
          exit 1

  # ── Failure Notification ────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-medusa, build-storefront, deploy]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          if [ -n "${{ secrets.BSWEB_INTERNAL_API_TOKEN }}" ] && [ -n "${{ secrets.BSWEB_URL }}" ]; then
            curl -s -X POST "${{ secrets.BSWEB_URL }}/api/admin/ci-notification" \
              -H "Authorization: Bearer ${{ secrets.BSWEB_INTERNAL_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{
                "repo": "${{ github.repository }}",
                "workflow": "${{ github.workflow }}",
                "status": "failure",
                "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "ref": "${{ github.ref }}",
                "actor": "${{ github.actor }}"
              }' && echo "✅ Notification sent" || echo "⚠️ Notification failed (non-blocking)"
          else
            echo "⚠️ BSWEB_URL or BSWEB_INTERNAL_API_TOKEN not configured — skipping notification"
          fi
